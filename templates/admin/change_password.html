{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width:400px;margin:40px auto;background:#222;padding:32px 24px;border-radius:12px;box-shadow:0 2px 16px #0002;">
  <h2 style="color:#FFD700;text-align:center;margin-bottom:24px;">Parolni o‘zgartirish</h2>
  <form method="post">
    <div style="margin-bottom:16px;">
      <label style="color:#fff;">Eski parol:</label>
      <input type="password" name="old_password" class="form-control" required>
    </div>
    <div style="margin-bottom:16px;">
      <label style="color:#fff;">Yangi parol:</label>
      <input type="password" name="new_password" class="form-control" required>
    </div>
    <div style="margin-bottom:24px;">
      <label style="color:#fff;">Yangi parol (takror):</label>
      <input type="password" name="confirm_password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-warning w-100" style="font-weight:700;">Saqlash</button>
  </form>
</div>
{% endblock %}
