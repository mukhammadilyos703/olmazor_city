{% extends "base.html" %}

{% block title %}Olmazor City - Kirish{% endblock %}

{% block content %}
<style>
  body, .login-bg {
    background: #111 !important;
    color: #FFD700 !important;
  }
  .login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }
  .login-card {
    background: #181818;
    border-radius: 18px;
    box-shadow: 0 4px 32px #0008;
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    border: 2px solid #FFD70033;
  }
  .login-title {
    color: #FFD700;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .form-label {
    color: #FFD700;
    font-weight: 700;
    background: #111;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .form-control {
    background: #222;
    color: #FFD700;
    border: 1.5px solid #FFD70055;
    border-radius: 8px;
    font-weight: 600;
  }
  .btn {
    background: linear-gradient(90deg, #FFD700 60%, #bfa100 100%) !important;
    color: #111 !important;
    font-weight: 800;
    border-radius: 8px;
    border: none;
    box-shadow: 0 2px 12px #FFD70033;
    font-size: 1.2rem;
    margin-top: 12px;
  }
  .btn:hover {
    background: linear-gradient(90deg, #fff700 60%, #FFD700 100%) !important;
    color: #000 !important;
  }
</style>
<div class="login-container">
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="fas fa-utensils fa-3x" style="color:#FFD700;margin-bottom:12px;"></i>
      <h2 class="login-title" style="color:#FFD700;font-weight:800;letter-spacing:1px;">Olmazor City</h2>
      <p style="color:#FFD700bb;font-size:1.1rem;">Admin paneliga kirish</p>
    </div>
    <form method="POST">
      <div class="form-group" style="margin-bottom:18px;">
        <label for="username" class="form-label" style="color:#FFD700;font-weight:700;background:#111;padding:2px 8px;border-radius:6px;">
          <i class="fas fa-user me-2"></i>Foydalanuvchi nomi
        </label>
        <input type="text" class="form-control" id="username" name="username" required style="background:#222;color:#FFD700;border:1.5px solid #FFD70055;border-radius:8px;font-weight:600;">
      </div>
      <div class="form-group" style="margin-bottom:24px;">
        <label for="password" class="form-label" style="color:#FFD700;font-weight:700;background:#111;padding:2px 8px;border-radius:6px;">
          <i class="fas fa-lock me-2"></i>Parol
        </label>
        <input type="password" class="form-control" id="password" name="password" required style="background:#222;color:#FFD700;border:1.5px solid #FFD70055;border-radius:8px;font-weight:600;">
      </div>
      <button type="submit" class="btn w-100 btn-lg" style="background:linear-gradient(90deg,#FFD700 60%,#bfa100 100%)!important;color:#111;font-weight:800;border-radius:8px;border:none;box-shadow:0 2px 12px #FFD70033;font-size:1.2rem;">
        <i class="fas fa-sign-in-alt me-2"></i>Kirish
      </button>
    </form>
    <div class="text-center mt-4">
      <p style="color:#FFD70099;font-size:1rem;">
        <i class="fas fa-info-circle me-1"></i>
        Demo ma'lumotlar: <span style="color:#FFD700;font-weight:700;">admin / admin123</span>
      </p>
    </div>
  </div>
</div>
{% endblock %}
